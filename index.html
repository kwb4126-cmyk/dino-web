<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Grow a Garden - 최종판</title>
<style>
    body { background: #fdf5f5; font-family: sans-serif; margin: 0; padding-bottom: 50px; }
    .header { background: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
    .card { background: #fff; border-radius: 16px; padding: 15px; text-align: center; border: 1px solid #f0f0f0; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .card img { width: 100%; height: 120px; object-fit: contain; }
    .btn-buy { background: #2563eb; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; }
    
    /* 로그인 모달 */
    #loginSection { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
    .login-box { background: white; padding: 30px; border-radius: 16px; width: 280px; text-align: center; }
    input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
</style>
</head>
<body>

<div class="header">
    <strong>Grow a Garden</strong>
    <button onclick="document.getElementById('loginSection').style.display='flex'">로그인</button>
</div>

<div class="grid" id="mainGrid"></div>

<!-- 로그인 창 -->
<div id="loginSection">
    <div class="login-box">
        <h2>로그인 / 가입</h2>
        <input type="text" id="nick" placeholder="닉네임">
        <input type="password" id="pw" placeholder="비밀번호">
        <button class="btn-buy" onclick="login()">시작하기</button>
        <button onclick="document.getElementById('loginSection').style.display='none'" style="background:none; border:none; margin-top:10px; color:#666;">닫기</button>
    </div>
</div>

<script>
    const ITEMS = [
        { name: "썬", img: "1000017735.jpg" },
        { name: "고스트", img: "1000017727.jpg" },
        { name: "스프링클러", img: "1000017728.jpg" },
        { name: "슈퍼물뿌리개", img: "1000017729.jpg" },
        { name: "문블라썸", img: "1000017730.jpg" },
        { name: "드래곤브레스", img: "1000017731.jpg" },
        { name: "히프노", img: "1000017736.jpg" }
    ];

    function render() {
        document.getElementById('mainGrid').innerHTML = ITEMS.map(it => `
            <div class="card">
                <img src="${it.img}" alt="${it.name}">
                <div style="font-weight:bold; margin-top:10px;">${it.name}</div>
                <button class="btn-buy" onclick="alert('${it.name} 구매!')">구매</button>
            </div>
        `).join('');
    }

    function login() {
        const nick = document.getElementById('nick').value;
        if(nick === "admin") {
            alert("관리자 모드 활성화");
        } else {
            alert(nick + "님 환영합니다!");
        }
        document.getElementById('loginSection').style.display = 'none';
    }

    render();
</script>
</body>
</html>
