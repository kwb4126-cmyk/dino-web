<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    body { background-color: #0d0d0d; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
    .shop-header { margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 600px; margin: 0 auto; }
    .card { background: #1a1a1a; border: 1px solid #444; border-radius: 10px; padding: 15px; }
    .price { color: #f39c12; font-size: 1.2rem; font-weight: bold; margin: 10px 0; }
    button { background: #e67e22; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
  </style>
</head>
<body>

  <div class="shop-header">
    <h1>샵 주인: 디노</h1>
    <p>지금 바로 아이템을 구매하세요!</p>
  </div>

  <div class="grid">
    <!-- 아이템 카드 1 -->
    <div class="card">
      <p>Gold Seed</p>
      <div class="price">0.1 원</div>
      <button onclick="order('Gold Seed', '0.1')">구매하기</button>
    </div>
    <!-- 아이템 카드 2 -->
    <div class="card">
      <p>Rainbow Seed</p>
      <div class="price">0.3 원</div>
      <button onclick="order('Rainbow Seed', '0.3')">구매하기</button>
    </div>
  </div>

  <script>
    function order(item, price) {
      const nick = prompt("닉네임을 입력하세요:");
      const qty = prompt("수량을 입력하세요:");
      if (nick && qty) {
        const msg = `[주문] 샵 주인: 디노 | 아이템: ${item} | 수량: ${qty} | 닉네임: ${nick} | 총액: ${price * qty}원`;
        // 여기서 카톡이나 구글폼으로 연결할 수 있습니다.
        alert("복사해서 주인에게 보내주세요:\n\n" + msg);
      }
    }
  </script>
</body>
</html>
