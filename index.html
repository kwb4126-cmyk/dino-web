<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>디노 시드샵</title>
<style>
  body { background: #0a050f; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-width: 600px; margin: 0 auto; }
  .card { background: #1a1025; padding: 15px; border-radius: 12px; }
  button { cursor: pointer; padding: 10px; background: #6c5ce7; color: white; border: none; border-radius: 8px; }
</style>
</head>
<body>
  <nav><button onclick="checkOrder()">거래 바로가기</button></nav>
  <div class="grid" id="itemGrid"></div>
  <script>
    const SCRIPT_URL = "여기에_배포된_웹앱_URL";
    async function order(name, price, btn) {
      const qty = btn.parentElement.querySelector('.qty-val').innerText;
      const nick = prompt("닉네임을 입력하세요:");
      if (!nick) return;
      const orderId = 'D-' + Math.random().toString(36).substr(2, 6).toUpperCase();
      await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'order', orderId, name, qty, nick, total: price * qty }) });
      alert("주문 완료! 주문번호: " + orderId);
    }
    async function checkOrder() {
      const id = prompt("주문번호를 입력하세요:");
      if (!id) return;
      const res = await fetch(`${SCRIPT_URL}?action=getMessage&orderId=${id}`);
      const data = await res.json();
      alert(`상태: ${data.status}\n관리자 메시지: ${data.adminMsg || '대기 중...'}`);
    }
    // (아이템 렌더링 생략 - 이전 코드와 동일)
  </script>
</body>
</html>
