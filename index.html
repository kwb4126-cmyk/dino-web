<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>디노 시드샵</title>
<style>
  body { background: #050308; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 600px; margin: 0 auto; }
  /* 디자인 카드 스타일 */
  .card { 
    background: linear-gradient(145deg, #1e1230, #130a20);
    border: 1px solid #6c5ce7; 
    border-radius: 16px; 
    padding: 15px; 
    text-align: center; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  }
  .price { color: #f4b400; font-weight: bold; margin: 5px 0; }
  button { cursor: pointer; padding: 10px; background: #6c5ce7; color: white; border: none; border-radius: 8px; width: 100%; margin-top: 8px; }
</style>
</head>
<body>

<nav style="text-align:center; margin-bottom:20px;">
  <button onclick="checkOrder()" style="background:#444; width:auto; padding:10px 30px;">거래 바로가기</button>
</nav>

<div class="grid" id="itemGrid"></div>

<script>
  // 주문 성공 시 주문번호 복사 및 알림
  async function order(name, price, btn) {
    const qty = btn.parentElement.querySelector('.qty-val').innerText;
    const nick = prompt("닉네임을 입력하세요:");
    if (!nick) return;
    
    const orderId = 'D-' + Math.random().toString(36).substr(2, 6).toUpperCase();
    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'order', orderId, name, qty, nick, total: price * qty }) });
    
    // 자동 복사 기능
    navigator.clipboard.writeText(orderId).then(() => {
      alert("주문 완료! 주문번호가 복사되었습니다: " + orderId + "\n'거래 바로가기'에서 관리자 답변을 확인하세요.");
    });
  }

  // 주문번호 조회 시 복사 버튼 추가
  async function checkOrder() {
    const id = prompt("주문번호를 입력하세요:");
    if (!id) return;
    const res = await fetch(`${SCRIPT_URL}?action=getMessage&orderId=${id}`);
    const data = await res.json();
    
    const msg = `상태: ${data.status}\n관리자 답변: ${data.adminMsg || '대기 중...'}`;
    if (confirm(msg + "\n\n(확인을 누르면 메시지가 복사됩니다)")) {
        navigator.clipboard.writeText(msg);
    }
  }

  // render() 함수는 이전과 동일
  render();
</script>
</body>
</html>
