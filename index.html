<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디노 시드샵 - 전문 상점</title>
<style>
  :root { --bg: #0a050f; --card-bg: #1a1025; --accent: #6c5ce7; --gold: #f4b400; --text: #fff; }
  body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; max-width: 800px; margin: 0 auto; }
  .card { background: var(--card-bg); border: 1px solid #4a1d63; border-radius: 16px; padding: 15px; text-align: center; position: relative; }
  .badge { position: absolute; top: 10px; left: 10px; background: #e05a4e; color: white; padding: 2px 8px; border-radius: 5px; font-size: 0.7rem; }
  .price { color: var(--gold); font-size: 1.2rem; font-weight: bold; margin: 10px 0; }
  .qty-control { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 10px 0; }
  .qty-btn { background: #333; color: white; border: none; width: 30px; height: 30px; border-radius: 5px; cursor: pointer; }
  .cart-btn { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 10px; width: 100%; cursor: pointer; }
</style>
</head>
<body>

<div class="grid" id="itemGrid"></div>

<script>
  const ITEMS = [
    { name: "문블라썸", price: 100, icon: "🌕" },
    { name: "히프노블라썸", price: 130, icon: "🌀" },
    { name: "드레곤브레스", price: 300, icon: "🔥" },
    { name: "썬블라썸", price: 1500, icon: "☀️" },
    { name: "슈퍼물뿌리개", price: 10, icon: "🚿" },
    { name: "슈퍼스프링클러", price: 11, icon: "💧" }
  ];

  function render() {
    const grid = document.getElementById('itemGrid');
    grid.innerHTML = ITEMS.map((it, idx) => `
      <div class="card">
        <div class="badge">Hot</div>
        <div style="font-size:3rem">${it.icon}</div>
        <h3>${it.name}</h3>
        <div class="price">${it.price}원</div>
        <div class="qty-control">
          <button class="qty-btn" onclick="changeQty(this, -1)">-</button>
          <span class="qty-val">1</span>
          <button class="qty-btn" onclick="changeQty(this, 1)">+</button>
        </div>
        <button class="cart-btn" onclick="order('${it.name}', ${it.price}, this)">구매하기</button>
      </div>
    `).join('');
  }

  function changeQty(btn, delta) {
    const display = btn.parentElement.querySelector('.qty-val');
    let val = parseInt(display.innerText) + delta;
    display.innerText = val < 1 ? 1 : val;
  }

  function order(name, price, btn) {
    const qty = btn.parentElement.querySelector('.qty-val').innerText;
    const nick = prompt("닉네임을 입력하세요:");
    if (!nick) return;
    alert(`[주문 요청]\n아이템: ${name}\n수량: ${qty}개\n닉네임: ${nick}\n총액: ${price * qty}원\n\n관리자에게 이 내용을 전송하세요.`);
  }

  render();
</script>
</body>
</html>
