<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grow a Garden</title>
<style>
    body { background: #fdf5f5; font-family: sans-serif; margin: 0; padding: 15px; color: #333; }
    h2 { font-size: 1.2rem; margin: 25px 0 15px; color: #444; border-left: 4px solid #2563eb; padding-left: 10px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .card { background: #fff; border-radius: 16px; padding: 20px; text-align: center; border: 1px solid #f0f0f0; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .emoji { font-size: 3rem; margin-bottom: 10px; }
    .name { font-weight: bold; font-size: 1.05rem; margin-bottom: 15px; }
    .btn-buy { background: #2563eb; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
</style>
</head>
<body>

<h2>씨앗 (Seeds)</h2>
<div class="grid" id="seedGrid"></div>

<h2>기어 (Gear)</h2>
<div class="grid" id="gearGrid"></div>

<script>
    // 상품 데이터
    const seeds = ["썬블라썸", "문블라썸", "드래곤브레스", "히프노", "고스트페퍼"];
    const gears = ["스프링클러", "슈퍼물뿌리개"];

    // 카드 생성 함수
    function createCards(list, containerId) {
        const container = document.getElementById(containerId);
        list.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="name">${item}</div>
                <button class="btn-buy" onclick="openOrder('${item}')">구매</button>
            `;
            container.appendChild(card);
        });
    }

    // 주문 창 열기
    function openOrder(itemName) {
        const nick = prompt("로블록스 닉네임을 입력하세요:");
        if (!nick) return;
        const qty = prompt(itemName + " 수량을 입력하세요:");
        if (!qty) return;

        // 티켓 형식 알림
        alert(`[주문 티켓]
-----------------------
상품명: ${itemName}
닉네임: ${nick}
수량: ${qty}개
-----------------------
관리자에게 주문이 접수되었습니다!`);
    }

    createCards(seeds, 'seedGrid');
    createCards(gears, 'gearGrid');
</script>

</body>
</html>
