<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디노 시드샵 - Professional</title>
<style>
  :root {
    --bg: #0a050f;
    --card-bg: rgba(30, 20, 45, 0.7);
    --accent: #9d4edd;
    --text: #ffffff;
    --gold: #f4b400;
  }
  body { 
    background: linear-gradient(135deg, #1e0a29, #0a050f); 
    color: var(--text); 
    font-family: 'Segoe UI', sans-serif; 
    margin: 0; 
    padding: 20px; 
  }
  header { text-align: center; padding: 40px 0; border-bottom: 1px solid #4a1d63; }
  #adminToggleBtn { background: transparent; border: 1px solid #4a1d63; color: #888; border-radius: 20px; padding: 5px 15px; cursor: pointer; float: right; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; max-width: 800px; margin: 30px auto; }
  .card { background: var(--card-bg); border: 1px solid #4a1d63; border-radius: 16px; padding: 20px; text-align: center; transition: 0.3s; }
  .card:hover { border-color: var(--accent); transform: translateY(-5px); }
  .card img { width: 100px; height: 100px; border-radius: 10px; margin-bottom: 15px; }
  .buy-btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; }
  .price { color: var(--gold); font-size: 1.2rem; font-weight: bold; margin: 10px 0; }
</style>
</head>
<body>

<button id="adminToggleBtn">관리자 접속</button>
<header>
  <h1>샵 주인: 디노</h1>
  <p>최고 등급의 씨앗을 즉시 배송해 드립니다.</p>
</header>

<div class="grid" id="itemGrid">
  <!-- 아이템 목록 (이미지 주소 교체 가능) -->
  <div class="card">
    <img src="https://via.placeholder.com/100" alt="Gold Seed">
    <h3>Gold Seed</h3>
    <div class="price">0.1 원</div>
    <button class="buy-btn" onclick="order('Gold Seed', 0.1)">구매하기</button>
  </div>
  <div class="card">
    <img src="https://via.placeholder.com/100" alt="Rainbow Seed">
    <h3>Rainbow Seed</h3>
    <div class="price">0.3 원</div>
    <button class="buy-btn" onclick="order('Rainbow Seed', 0.3)">구매하기</button>
  </div>
</div>

<script>
  // 관리자 비밀번호 (보안: 실제 서비스 시 난독화 권장)
  const ADMIN_PASS = "dino1234";

  function order(item, price) {
    const nick = prompt("닉네임을 입력하세요:");
    const qty = prompt("수량을 입력하세요:");
    if (nick && qty) {
      const msg = `[주문] 샵 주인: 디노 | 아이템: ${item} | 수량: ${qty} | 닉네임: ${nick} | 총액: ${price * qty}원`;
      alert("다음 내용을 복사하여 전송하세요:\n\n" + msg);
    }
  }

  document.getElementById('adminToggleBtn').onclick = () => {
    const input = prompt("관리자 비밀번호를 입력하세요:");
    if (input === ADMIN_PASS) {
      alert("관리자 권한 확인됨. (관리 페이지 로직을 추가하세요)");
    } else {
      alert("보안 위반: 비밀번호가 틀렸습니다.");
    }
  };
</script>

</body>
</html>
