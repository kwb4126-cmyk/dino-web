<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>디노 시드샵</title>
<style>
    body { background: #050308; color: #fff; font-family: sans-serif; padding: 15px; margin: 0; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 600px; margin: 0 auto; }
    .card { background: linear-gradient(145deg, #1e1230, #130a20); border: 1px solid #6c5ce7; border-radius: 16px; padding: 15px; text-align: center; }
    button { cursor: pointer; padding: 10px; background: #6c5ce7; color: white; border: none; border-radius: 8px; width: 100%; margin-top: 8px; }
</style>
</head>
<body>
    <nav style="text-align:center; margin-bottom:20px;">
        <button onclick="checkOrder()" style="background:#444; width:auto; padding:10px 30px;">거래 바로가기</button>
    </nav>
    <div class="grid" id="itemGrid"></div>

    <script>
        const SCRIPT_URL = "여기에_구글_웹앱_URL";
        const ITEMS = [
            { name: "문블", price: 100, icon: "🌕" },
            { name: "히블", price: 130, icon: "🌀" },
            { name: "드브", price: 300, icon: "🔥" },
            { name: "썬블", price: 1500, icon: "☀️" },
            { name: "물뿌리개", price: 10, icon: "🚿" },
            { name: "스프링클러", price: 11, icon: "💧" }
        ];

        function render() {
            document.getElementById('itemGrid').innerHTML = ITEMS.map(it => `
                <div class="card">
                    <div style="font-size:2rem">${it.icon}</div>
                    <div style="font-weight:bold">${it.name}</div>
                    <div class="price">${it.price}원</div>
                    <button onclick="order('${it.name}', ${it.price})">구매하기</button>
                </div>
            `).join('');
        }
        
        async function order(name, price) {
            const nick = prompt("닉네임을 입력하세요:");
            if (!nick) return;
            const orderId = 'D-' + Math.random().toString(36).substr(2, 6).toUpperCase();
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'order', orderId, name, nick, total: price }) });
            navigator.clipboard.writeText(orderId);
            alert("주문 완료! 주문번호가 복사되었습니다: " + orderId);
        }
        
        async function checkOrder() {
            const id = prompt("주문번호를 입력하세요:");
            if (!id) return;
            const res = await fetch(`${SCRIPT_URL}?action=getMessage&orderId=${id}`);
            const data = await res.json();
            alert(`상태: ${data.status}\n관리자 답변: ${data.adminMsg || '대기 중...'}`);
        }
        
        render();
    </script>
</body>
</html>
